name: Update Duty Roster Data

on:
  workflow_dispatch:
    inputs:
      roster_file:
        description: 'Path to roster file (CSV/Excel)'
        required: false
        default: 'roster-update/roster.csv'

  repository_dispatch:
    types: [roster-update]

  push:
    branches: [main]
    paths:
      - 'DutyRoster.md'
      - 'data.js'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  process-roster:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas

      - name: Process roster
        id: process
        run: |
          python << 'EOF'
          import re
          
          # 讀取 DutyRoster.md
          with open('DutyRoster.md', 'r') as f:
            content = f.read()
          
          # 找 CSV 數據 section
          lines = content.split('\n')
          csv_lines = []
          in_csv = False
          
          for line in lines:
            if line.startswith('WM001,') or line.startswith('APN001,') or line.startswith('RN0') or line.startswith('EN0') or line.startswith('L00'):
              in_csv = True
            if in_csv:
              if ',' in line and len(line) > 5:
                csv_lines.append(line.strip())
          
          # 生成 data.js
          records = []
          for line in csv_lines:
            parts = line.split(',')
            if len(parts) >= 3:
              staff_id = parts[0].strip()
              date = parts[1].strip()
              shift = parts[2].strip()
              records.append(f'["{staff_id}", "{date}", "{shift}"]')
          
          # 讀取現有 data.js
          with open('data.js', 'r') as f:
            data_content = f.read()
          
          # 找到 ROSTER_RAW section
          marker_start = 'const ROSTER_RAW = ['
          marker_end = '];'
          
          start_idx = data_content.find(marker_start)
          end_idx = data_content.find(marker_end, start_idx)
          
          if start_idx != -1 and end_idx != -1:
            # 替換內容
            new_records = ',\n  '.join(records[:500])  # 限制最多500條
            new_section = f'{marker_start}\n  {new_records}\n  {marker_end}'
            data_content = data_content[:start_idx] + new_section + data_content[end_idx+2:]
          
          # 寫回 data.js
          with open('data.js', 'w') as f:
            f.write(data_content)
          
          print(f"Updated data.js with {len(records)} records")
          
          # 輸出 latest date
          if records:
            import subprocess
            dates = [r.split('"')[3] for r in records]
            latest = max(dates) if dates else ''
            print(f"Latest date: {latest}")
            with open('.latest_date', 'w') as f:
              f.write(latest)
          EOF

      - name: Configure Git
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"

      - name: Commit changes
        run: |
          git add data.js
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update roster data $(date +%Y-%m-%d)"
            git push
          fi

  deploy:
    needs: process-roster
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - id: deployment
        uses: actions/deploy-pages@v4