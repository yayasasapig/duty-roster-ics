<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>東區醫院 A5 病房更表下載</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config={theme:{extend:{colors:{bg:'#fafcfb',mint:'#5BBCAD',mintDark:'#4AA89B',slate2:'#1E2A32',slate3:'#6B7C86',border:'#E8EEF0',warm:'#E07A5F'},fontFamily:{sans:['Outfit','system-ui','sans-serif'],mono:['JetBrains Mono','monospace']},boxShadow:{'card':'0 2px 12px rgba(0,0,0,0.06)','card-hover':'0 4px 16px rgba(0,0,0,0.10)','btn':'0 2px 8px rgba(91,188,173,0.30)','btn-hover':'0 4px 16px rgba(91,188,173,0.40)'}}}};
  </script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    .tab-btn.active{background:#5BBCAD;color:#fff}.tab-btn:not(.active){background:#fafcfb;color:#6B7C86}
    details[open] summary .summary-chevron{transform:rotate(180deg)}details summary .summary-chevron{transition:transform 0.2s}
    @media print{.no-print{display:none!important}body{background:#fff;padding:0}.card-wrap{box-shadow:none;padding:12px 8px;border-radius:0}@page{size:landscape;margin:10mm}}
  </style>
</head>
<body class="bg-bg font-sans text-slate2 antialiased min-h-[100dvh]">

  <header class="bg-white border-b border-border no-print">
    <div class="max-w-5xl mx-auto px-4 py-5 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-mint/10 rounded-xl flex items-center justify-center">
          <i data-lucide="stethoscope" class="w-5 h-5 text-mint" stroke-width="1.5"></i>
        </div>
        <div>
          <h1 class="text-sm text-slate3">Pamela Youde Nethersole Eastern Hospital</h1>
          <p class="text-lg font-bold text-slate2">Department of Medicine, Unit <span class="text-mint">A5</span></p>
        </div>
      </div>
      <div class="flex items-center gap-2">
        <button id="prevMonth" class="p-2 rounded-xl hover:bg-bg transition-all duration-200 hover:-translate-y-[1px]">
          <i data-lucide="chevron-left" class="w-5 h-5 text-slate3" stroke-width="1.5"></i>
        </button>
        <span id="currentMonthLabel" class="text-base font-semibold text-slate2 min-w-[120px] text-center"></span>
        <button id="nextMonth" class="p-2 rounded-xl hover:bg-bg transition-all duration-200 hover:-translate-y-[1px]">
          <i data-lucide="chevron-right" class="w-5 h-5 text-slate3" stroke-width="1.5"></i>
        </button>
      </div>
    </div>
  </header>

  <div class="max-w-5xl mx-auto px-4 py-8">
    <div class="card-wrap bg-white rounded-2xl shadow-card p-6 sm:p-8">
      <div class="tabs flex gap-0 mb-6 border border-border rounded-xl overflow-hidden no-print">
        <button class="tab-btn flex-1 py-3 px-4 text-sm font-semibold flex items-center justify-center gap-2 transition-all duration-200 border-r border-border active" data-tab="ical" id="tabIcal">
          <i data-lucide="calendar" class="w-4 h-4" stroke-width="2"></i> iCalendar
        </button>
        <button class="tab-btn flex-1 py-3 px-4 text-sm font-semibold flex items-center justify-center gap-2 transition-all duration-200 border-r border-border" data-tab="ward" id="tabWard">
          <i data-lucide="users" class="w-4 h-4" stroke-width="2"></i> Ward View
        </button>
        <button class="tab-btn flex-1 py-3 px-4 text-sm font-semibold flex items-center justify-center gap-2 transition-all duration-200" data-tab="print" id="tabPrint">
          <i data-lucide="printer" class="w-4 h-4" stroke-width="2"></i> 打印視圖
        </button>
      </div>

      <div class="tab-panel" id="panelIcal">
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-4">
          <div>
            <label class="block text-sm font-semibold text-slate2 mb-2">護士姓名</label>
            <select id="staffSelect" class="w-full px-4 py-3 rounded-xl border border-border bg-bg text-slate2 font-medium focus:outline-none focus:ring-2 focus:ring-mint/30 transition-all duration-200">
              <option value="">— 請選擇 —</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-semibold text-slate2 mb-2">日期範圍</label>
            <div class="grid grid-cols-2 gap-2">
              <input type="date" id="startDate" class="w-full px-4 py-3 rounded-xl border border-border bg-bg text-slate2 font-mono text-sm focus:outline-none focus:ring-2 focus:ring-mint/30 transition-all duration-200" />
              <input type="date" id="endDate" class="w-full px-4 py-3 rounded-xl border border-border bg-bg text-slate2 font-mono text-sm focus:outline-none focus:ring-2 focus:ring-mint/30 transition-all duration-200" />
            </div>
          </div>
        </div>
        <div class="flex gap-3 mb-4">
          <button id="previewBtn" disabled class="flex-1 sm:flex-none px-6 py-3 rounded-xl font-semibold text-sm flex items-center justify-center gap-2 transition-all duration-200 border-2 border-mint text-mint hover:bg-mint hover:text-white disabled:opacity-40 disabled:cursor-not-allowed">
            <i data-lucide="eye" class="w-4 h-4" stroke-width="2"></i> 預覽更期
          </button>
          <button id="downloadBtn" disabled class="flex-1 sm:flex-none px-6 py-3 rounded-xl font-semibold text-sm flex items-center justify-center gap-2 bg-mint text-white shadow-btn hover:shadow-btn-hover hover:-translate-y-[1px] transition-all duration-200 disabled:opacity-40 disabled:cursor-not-allowed">
            <i data-lucide="download" class="w-4 h-4" stroke-width="2"></i> 下載 .ics
          </button>
        </div>
        <div id="previewArea" class="hidden mb-4 border border-border rounded-xl overflow-hidden">
          <div class="bg-mint text-white text-xs font-bold px-4 py-2.5 flex items-center gap-2">
            <i data-lucide="clipboard-list" class="w-3.5 h-3.5" stroke-width="2"></i> 預覽 — 確認後再下載
          </div>
          <div id="previewContent" class="p-4"></div>
        </div>
        <div id="msgBox" class="hidden mb-4 px-4 py-3 rounded-xl text-sm flex items-center gap-2"></div>
        <div class="mt-6 p-4 bg-bg rounded-xl">
          <div class="flex items-center gap-2 mb-3">
            <i data-lucide="info" class="w-4 h-4 text-mint" stroke-width="2"></i>
            <span class="text-xs font-bold text-slate3 uppercase tracking-wider">班次代碼說明</span>
          </div>
          <div class="grid grid-cols-2 sm:grid-cols-3 gap-x-4 gap-y-2">
            <div class="flex items-center gap-2"><span class="w-9 h-9 bg-mint rounded-lg flex items-center justify-center text-white text-xs font-bold">A5</span><span class="text-sm text-slate2 font-mono">07:00–15:00</span></div>
            <div class="flex items-center gap-2"><span class="w-9 h-9 bg-blue-400 rounded-lg flex items-center justify-center text-white text-xs font-bold">P5</span><span class="text-sm text-slate2 font-mono">14:00–22:00</span></div>
            <div class="flex items-center gap-2"><span class="w-9 h-9 bg-violet-400 rounded-lg flex items-center justify-center text-white text-xs font-bold">AN</span><span class="text-sm text-slate2 font-mono text-xs">07:00–14:00 / 21:00–23:59</span></div>
            <div class="flex items-center gap-2"><span class="w-9 h-9 bg-indigo-400 rounded-lg flex items-center justify-center text-white text-xs font-bold">N*</span><span class="text-sm text-slate2 font-mono">07:00–13:00</span></div>
            <div class="flex items-center gap-2"><span class="w-9 h-9 bg-rose-400 rounded-lg flex items-center justify-center text-white text-xs font-bold">D*</span><span class="text-sm text-slate2 font-mono">主管更</span></div>
            <div class="flex items-center gap-2"><span class="w-9 h-9 bg-fuchsia-400 rounded-lg flex items-center justify-center text-white text-xs font-bold">D5</span><span class="text-sm text-slate2 font-mono">Renal培訓</span></div>
            <div class="col-span-2 sm:col-span-3 flex items-center gap-2"><span class="w-9 h-9 bg-slate-400 rounded-lg flex items-center justify-center text-white text-xs font-bold">OFF</span><span class="text-sm text-slate3">WO / O / AL / NDD / MY1 / SD / CCLV / AP* — 放假，不產生行事曆事件</span></div>
          </div>
        </div>
      </div>

      <div class="tab-panel hidden" id="panelWard">
        <div class="flex items-center gap-3 mb-4">
          <label class="text-sm font-semibold text-slate2 whitespace-nowrap">選擇日期</label>
          <button id="wardPrevBtn" class="p-2 rounded-xl border border-border hover:bg-bg transition-all duration-200"><i data-lucide="chevron-left" class="w-4 h-4 text-slate3" stroke-width="1.5"></i></button>
          <input type="date" id="wardDate" class="flex-1 px-4 py-2.5 rounded-xl border border-border bg-bg text-slate2 font-mono text-sm focus:outline-none focus:ring-2 focus:ring-mint/30 transition-all duration-200" />
          <button id="wardNextBtn" class="p-2 rounded-xl border border-border hover:bg-bg transition-all duration-200"><i data-lucide="chevron-right" class="w-4 h-4 text-slate3" stroke-width="1.5"></i></button>
        </div>
        <div class="flex items-center gap-2 mb-4 flex-wrap no-print">
          <span class="text-xs font-semibold text-slate3 mr-1">顯示班次</span>
          <button class="shift-filter-btn px-3 py-1.5 rounded-full border-2 text-xs font-bold transition-all duration-200 flex items-center gap-1.5 bg-mint border-mint text-white" data-filter="A" id="filterA"><i data-lucide="check" class="w-3 h-3" stroke-width="2.5"></i> A</button>
          <button class="shift-filter-btn px-3 py-1.5 rounded-full border-2 text-xs font-bold transition-all duration-200 flex items-center gap-1.5 bg-blue-400 border-blue-400 text-white" data-filter="P" id="filterP"><i data-lucide="check" class="w-3 h-3" stroke-width="2.5"></i> P</button>
          <button class="shift-filter-btn px-3 py-1.5 rounded-full border-2 text-xs font-bold transition-all duration-200 flex items-center gap-1.5 bg-violet-400 border-violet-400 text-white" data-filter="AN" id="filterAN"><i data-lucide="check" class="w-3 h-3" stroke-width="2.5"></i> AN</button>
          <button class="shift-filter-btn px-3 py-1.5 rounded-full border-2 text-xs font-bold transition-all duration-200 flex items-center gap-1.5 bg-bg border-slate-200 text-slate-400" data-filter="OFF" id="filterOFF"><i data-lucide="x" class="w-3 h-3" stroke-width="2.5"></i> 假期</button>
        </div>
        <div id="wardStats" class="flex gap-2 mb-4 flex-wrap"></div>
        <div id="wardContent"></div>
      </div>

      <div class="tab-panel hidden" id="panelPrint">
        <div class="flex items-center gap-3 mb-4 no-print">
          <label class="text-sm font-semibold text-slate2 whitespace-nowrap">選擇週起始（週一）</label>
          <button id="printPrevBtn" class="p-2 rounded-xl border border-border hover:bg-bg transition-all duration-200"><i data-lucide="chevron-left" class="w-4 h-4 text-slate3" stroke-width="1.5"></i></button>
          <input type="date" id="printWeekStart" class="flex-1 px-4 py-2.5 rounded-xl border border-border bg-bg text-slate2 font-mono text-sm focus:outline-none focus:ring-2 focus:ring-mint/30 transition-all duration-200" />
          <button id="printNextBtn" class="p-2 rounded-xl border border-border hover:bg-bg transition-all duration-200"><i data-lucide="chevron-right" class="w-4 h-4 text-slate3" stroke-width="1.5"></i></button>
        </div>
        <div id="printContent"></div>
      </div>
    </div>
    <footer class="mt-8 pt-6 border-t border-border flex flex-col sm:flex-row items-center justify-between gap-3 text-sm text-slate3">
      <p>東區醫院 A5 病房更表系統</p>
      <a href="https://github.com/yayasasapig/duty-roster-ics" target="_blank" class="flex items-center gap-2 hover:text-mint transition-colors duration-200">
        <i data-lucide="github" class="w-4 h-4" stroke-width="1.5"></i> GitHub Repo
      </a>
    </footer>
  </div>
  <script src="data.js"></script>
  <script>
    lucide.createIcons();
    var currentDate=new Date();
    function updateMonthLabel(){document.getElementById('currentMonthLabel').textContent=currentDate.getFullYear()+'\u5e74'+(currentDate.getMonth()+1)+'\u6708';}
    updateMonthLabel();
    document.getElementById('prevMonth').addEventListener('click',function(){currentDate.setMonth(currentDate.getMonth()-1);updateMonthLabel();});
    document.getElementById('nextMonth').addEventListener('click',function(){currentDate.setMonth(currentDate.getMonth()+1);updateMonthLabel();});
    var tabs=document.querySelectorAll('.tab-btn');
    var panels=document.querySelectorAll('.tab-panel');
    tabs.forEach(function(tab){tab.addEventListener('click',function(){
      var target=tab.dataset.tab;
      tabs.forEach(function(t){t.classList.toggle('active',t.dataset.tab===target);});
      panels.forEach(function(p){p.classList.toggle('hidden',p.id!=='panel'+(target.charAt(0).toUpperCase()+target.slice(1)));});
      if(target==='ward')renderWardView();
      if(target==='print')renderPrintView();
      lucide.createIcons();
    });});
    var shiftFilters={A:true,P:true,AN:true,OFF:false};
    var filterActiveClass={A:'bg-mint border-mint text-white',P:'bg-blue-400 border-blue-400 text-white',AN:'bg-violet-400 border-violet-400 text-white',OFF:'bg-slate-400 border-slate-400 text-white'};
    var filterInactiveClass={A:'bg-bg border-slate-200 text-slate-400',P:'bg-bg border-slate-200 text-slate-400',AN:'bg-bg border-slate-200 text-slate-400',OFF:'bg-bg border-slate-200 text-slate-400'};
    function updateFilterUI(){document.querySelectorAll('.shift-filter-btn').forEach(function(btn){var f=btn.dataset.filter;btn.className='shift-filter-btn px-3 py-1.5 rounded-full border-2 text-xs font-bold transition-all duration-200 flex items-center gap-1.5 '+(shiftFilters[f]?filterActiveClass[f]:filterInactiveClass[f]);});}
    updateFilterUI();
    document.querySelectorAll('.shift-filter-btn').forEach(function(btn){btn.addEventListener('click',function(){var f=btn.dataset.filter;shiftFilters[f]=!shiftFilters[f];updateFilterUI();lucide.createIcons();applyShiftFilters();});});
    function isOffShift(shift){var s=shift.toUpperCase();return s==='WO'||s==='O'||s==='AL'||s==='NDD'||s==='MY1'||s==='MY2'||s==='SD'||s==='CCLV'||s.match(/^AP/)!==null;}
    function shiftToTimes(shift){var s=shift.toUpperCase();if(isOffShift(shift))return null;if(s==='A5')return[{sh:7,sm:0,eh:15,em:0}];if(s==='P5')return[{sh:14,sm:0,eh:22,em:0}];if(s==='AN')return[{sh:7,sm:0,eh:14,em:0},{sh:21,sm:0,eh:23,em:59}];if(s==='N*')return[{sh:7,sm:0,eh:13,em:0}];if(s==='D*')return[{sh:7,sm:0,eh:15,em:0}];if(s==='D5')return[{sh:9,sm:0,eh:17,em:48}];return null;}
    function shiftLabel(shift){var s=shift.toUpperCase();var m={'\u300aA5\u300b':'\u8fd4A','\u300aP5\u300b':'\u8fd4P','\u300aAN\u300b':'\u8fd4AN','\u300aN*\u300b':'Sleeping','\u300aD*\u300b':'\u4e3b\u7ba1\u66f4','\u300aD5\u300b':'Renal\u57f9\u8a13'};return m[s]||shift;}
    function shiftTimeDesc(shift){var s=shift.toUpperCase();var m={'\u300aA5\u300b':'07:00\u201315:00','\u300aP5\u300b':'14:00\u201322:00','\u300aAN\u300b':'07:00\u201314:00 / 21:00\u201323:59','\u300aN*\u300b':'07:00\u201313:00','\u300aD*\u300b':'07:00\u201315:00','\u300aD5\u300b':'09:00\u201317:48'};return m[s]||'\u2014';}
    function getShiftCodeClass(shift){if(isOffShift(shift))return'bg-slate-400';var s=shift.toUpperCase();if(s==='AN')return'bg-violet-400';if(s==='N*'||s==='NDD')return'bg-indigo-400';if(s==='D5')return'bg-fuchsia-400';if(s.startsWith('D'))return'bg-rose-400';if(s.startsWith('A'))return'bg-mint';if(s.startsWith('P'))return'bg-blue-400';return'bg-slate-400';}
    function getPreviewData(staffId,start,end){var rows=[];for(var i=0;i<ROSTER_RAW.length;i++){var r=ROSTER_RAW[i];if(r[0]===staffId&&r[1]>=start&&r[1]<=end)rows.push({date:r[1],shift:r[2]});}rows.sort(function(a,b){return a.date.localeCompare(b.date);});return rows;}
    var staffSelect=document.getElementById('staffSelect');
    var startDate=document.getElementById('startDate');
    var endDate=document.getElementById('endDate');
    var downloadBtn=document.getElementById('downloadBtn');
    var previewBtn=document.getElementById('previewBtn');
    var msgBox=document.getElementById('msgBox');
    var staffKeys=Object.keys(STAFF).sort();
    staffKeys.forEach(function(id){var opt=document.createElement('option');opt.value=id;opt.textContent=id+'\u2014'+STAFF[id];staffSelect.appendChild(opt);});
    startDate.value='2026-03-01';endDate.value='2026-05-31';startDate.max='2026-05-31';endDate.min='2026-03-01';endDate.max='2026-05-31';
    function validateForm(){var staffOk=staffSelect.value!=='';var startOk=startDate.value!=='';var endOk=endDate.value!=='';var rangeOk=startOk&&endOk&&startDate.value<=endDate.value;var allOk=staffOk&&rangeOk;downloadBtn.disabled=!allOk;previewBtn.disabled=!allOk;}
    staffSelect.addEventListener('change',function(){document.getElementById('previewArea').classList.add('hidden');validateForm();});
    startDate.addEventListener('change',function(){endDate.min=startDate.value;document.getElementById('previewArea').classList.add('hidden');validateForm();});
    endDate.addEventListener('change',function(){startDate.max=endDate.value;document.getElementById('previewArea').classList.add('hidden');validateForm();});
    previewBtn.addEventListener('click',function(){
      var data=getPreviewData(staffSelect.value,startDate.value,endDate.value);
      var area=document.getElementById('previewArea');
      var content=document.getElementById('previewContent');
      if(data.length===0){area.classList.remove('hidden');content.innerHTML='<div class="text-center py-8 text-slate3 text-sm">\u5728\u6307\u5b9a\u65e5\u671f\u7bc4\u570f\u5167\u627e\u4e0d\u5230\u4efb\u4f55\u66f4\u671f\u8a18\u9304</div>';return;}
      var wkday=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
      var html='<div class="overflow-x-auto"><table class="w-full text-sm border-collapse"><thead><tr class="bg-bg"><th class="text-left px-3 py-2 text-xs font-bold text-slate3 uppercase tracking-wider border-b border-border">\u65e5\u671f</th><th class="text-left px-3 py-2 text-xs font-bold text-slate3 uppercase tracking-wider border-b border-border">\u661f\u671f</th><th class="text-left px-3 py-2 text-xs font-bold text-slate3 uppercase tracking-wider border-b border-border">\u73ed\u6b21</th><th class="text-left px-3 py-2 text-xs font-bold text-slate3 uppercase tracking-wider border-b border-border">\u6642\u9593</th><th class="text-left px-3 py-2 text-xs font-bold text-slate3 uppercase tracking-wider border-b border-border">\u8aaa\u660e</th></tr></thead><tbody>';
      for(var i=0;i<data.length;i++){
        var row=data[i];var parts=row.date.split('-');var y=parseInt(parts[0]),mo=parseInt(parts[1]),d=parseInt(parts[2]);
        var dt=new Date(y,mo-1,d);var w=wkday[dt.getDay()];
        var dayStr=(mo<10?'0':'')+mo+'/'+(d<10?'0':'')+d;
        var off=isOffShift(row.shift);var codeClass=off?'bg-slate-400':getShiftCodeClass(row.shift);
        html+='<tr class="'+(off?'text-slate-400':'hover:bg-bg/50')+' border-b border-border/50 transition-colors"><td class="px-3 py-2 font-mono text-xs">'+dayStr+'</td><td class="px-3 py-2 text-xs">'+w+'</td><td class="px-3 py-2"><span class="inline-block px-2 py-0.5 rounded text-xs font-bold text-white '+codeClass+'">'+row.shift+'</span></td><td class="px-3 py-2 text-xs text-slate3 font-mono">'+shiftTimeDesc(row.shift)+'</td><td class="px-3 py-2 text-xs text-slate3">'+(off?'\u653e\u5047':'')+'</td></tr>';
      }
      html+='</tbody></table></div>';area.classList.remove('hidden');content.innerHTML=html;
    });
    downloadBtn.addEventListener('click',function(){
      msgBox.className='hidden';
      var ics=generateICS(staffSelect.value,startDate.value,endDate.value);
      var blob=new Blob([ics],{type:'text/calendar;charset=utf-8'});
      var url=URL.createObjectURL(blob);var a=document.createElement('a');
      a.href=url;a.download='A5_'+staffSelect.value+'_'+startDate.value+'_'+endDate.value+'.ics';
      document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
      var rawRows=getPreviewData(staffSelect.value,startDate.value,endDate.value);
      var eventCount=0;for(var i=0;i<rawRows.length;i++){var t=shiftToTimes(rawRows[i].shift);eventCount+=t?t.length:0;}
      var offCount=0;for(var i=0;i<rawRows.length;i++){if(isOffShift(rawRows[i].shift))offCount++;}
      var workCount=rawRows.length-offCount;
      msgBox.innerHTML=workCount>0?'<i data-lucide="check-circle" class="w-4 h-4" stroke-width="2"></i> \u5df2\u4e0b\u8f09\uff0c\u5171 <b>'+eventCount+'</b> \u500b\u884c\u4e8b\u6bdc\u6e1b\u4e8b\u4ef6\uff08'+workCount+' \u500b\u5de5\u4f5c\u5929\uff09':'<i data-lucide="alert-triangle" class="w-4 h-4" stroke-width="2"></i> \u5728\u6307\u5b9a\u65e5\u671f\u7bc4\u570f\u5167\u627e\u4e0d\u5230\u5de5\u4f5c\u73ed\u6b21';
      msgBox.className='mb-4 px-4 py-3 rounded-xl text-sm flex items-center gap-2 '+(workCount>0?'bg-green-50 text-green-700':'bg-amber-50 text-amber-700');
      lucide.createIcons();
    });
    var MIN_DATE='2026-03-01';var MAX_DATE='2026-05-31';var currentWardDate=MIN_DATE;
    function applyShiftFilters(){
      var rows=document.querySelectorAll('.ward-row[data-shift]');
      rows.forEach(function(row){
        var shift=row.getAttribute('data-shift');var u=shift.toUpperCase();
        var isOff=u==='WO'||u==='O'||u==='AL'||u==='NDD'||u==='MY1'||u==='MY2'||u==='SD'||u==='CCLV'||u.match(/^AP/)!==null;
        if(isOff){row.classList.toggle('hidden',!shiftFilters.OFF);return;}
        if(u==='A5'){row.classList.toggle('hidden',!shiftFilters.A);return;}
        if(u==='P5'){row.classList.toggle('hidden',!shiftFilters.P);return;}
        if(u==='AN'){row.classList.toggle('hidden',!shiftFilters.AN);return;}
      });
    }
    function renderWardView(){
      var dateStr=currentWardDate;var parts=dateStr.split('-');

      var dt=new Date(y,mo-1,d);var dayLabel=wkday[dt.getDay()];var dateLabel=mo+'\u6708'+d+'\u65e5 '+dayLabel;
      var rotaMap={};for(var i=0;i<ROSTER_RAW.length;i++){var r=ROSTER_RAW[i];if(r[1]===dateStr)rotaMap[r[0]]=r[2];}

      for(var i=0;i<staffKeys2.length;i++){var sid=staffKeys2[i];if(sid.startsWith('WM'))groups[0].ids.push(sid);else if(sid.startsWith('APN'))groups[1].ids.push(sid);else if(sid.startsWith('RN'))groups[2].ids.push(sid);else if(sid.startsWith('EN'))groups[3].ids.push(sid);else groups[4].ids.push(sid);}
      var totalWork=0,totalOff=0;var rotaVals=Object.values(rotaMap);for(var i=0;i<rotaVals.length;i++){if(isOffShift(rotaVals[i]))totalOff++;else totalWork++;}
      var unassigned=Object.keys(STAFF).length-totalWork-totalOff;

      var groupColors={WM:'bg-slate-2',APN:'bg-blue-500',RN:'bg-mint',EN:'bg-violet-400',LOC:'bg-slate-400'};
      var html='';
      groups.forEach(function(g){if(g.ids.length===0)return;html+='<div class="ward-group mb-4"><div class="ward-group-header rounded-t-xl px-4 py-2.5 text-white text-xs font-bold flex items-center justify-between '+groupColors[g.key]+'"><span>'+g.label+'</span><span class="bg-white/20 px-2 py-0.5 rounded-full text-xs">'+g.ids.length+'</span></div><div class="ward-group-body border border-t-0 border-border rounded-b-xl overflow-hidden">';g.ids.forEach(function(id){var shift=rotaMap[id]||null;if(shift){var codeClass=getShiftCodeClass(shift);var shiftUpper=shift.toUpperCase();var fk=shiftUpper.startsWith('A')?'A':shiftUpper.startsWith('P')?'P':shiftUpper.startsWith('AN')?'AN':'OFF';html+='<div class="ward-row flex items-center gap-3 px-4 py-2.5 border-b border-border/50 hover:bg-bg/60 transition-colors '+(shiftFilters[fk]?'':'hidden')+'" data-shift="'+shiftUpper+'"><div class="flex-1 min-w-0"><span class="font-medium text-slate2 text-sm truncate block">'+STAFF[id]+'</span><span class="text-xs text-slate3 font-mono">'+id+'</span></div><span class="inline-block px-2 py-0.5 rounded text-xs font-bold text-white '+codeClass+'">'+shift+'</span><span class="text-xs text-slate3 hidden sm:block">'+shiftLabel(shift)+' \u00b7 '+shiftTimeDesc(shift)+'</span></div>';}else{html+='<div class="ward-row flex items-center gap-3 px-4 py-2.5 border-b border-border/50 hover:bg-bg/60 transition-colors"><div class="flex-1 min-w-0"><span class="font-medium text-slate2 text-sm truncate block">'+STAFF[id]+'</span><span class="text-xs text-slate3 font-mono">'+id+'</span></div><span class="text-xs text-slate-400 italic">\u672a\u6392\u66f4</span></div>';}});html+='</div></div>';});
      document.getElementById('wardContent').innerHTML=html||'<div class="text-center py-8 text-slate3 text-sm">\u7121\u8cc7\u6599</div>';
      document.getElementById('wardDate').value=dateStr;
      applyShiftFilters();
    }
    document.getElementById('wardPrevBtn').addEventListener('click',function(){var p=new Date(currentWardDate);p.setDate(p.getDate()-1);if(p>=MIN_DATE){currentWardDate=p.toISOString().split('T')[0];renderWardView();}});
    document.getElementById('wardNextBtn').addEventListener('click',function(){var p=new Date(currentWardDate);p.setDate(p.getDate()+1);if(p<=MAX_DATE){currentWardDate=p.toISOString().split('T')[0];renderWardView();}});
    document.getElementById('wardDate').addEventListener('change',function(){var v=this.value;if(v>=MIN_DATE&&v<=MAX_DATE){currentWardDate=v;renderWardView();}});

      var groupColor={WM:'#003087',APN:'#005EB8',RN:'#007F3B',EN:'#7B2D8B',L:'#37474F'};

      html+='<thead><tr><th class="staff-col" style="width:180px;background:#003087;color:#fff;text-align:left;padding:6px 8px;border:1px solid #000;font-weight:700;">\u7d93\u7406\u4eba\u54e1 / \u8cc7\u6e90</th>';
      days.forEach(function(day,i){var parts=day.split('-');var mo=parseInt(parts[1]),d2=parseInt(parts[2]);html+='<th style="padding:6px 4px;border:1px solid #000;background:#D0DCE8;font-weight:700;font-size:11px;text-align:center;">'+wkday[i].replace('\u661f\u671f','')+'<br>'+mo+'/'+d2+'</th>';});
      html+='<th style="width:140px;background:#F0F4F8;border:1px solid #000;font-weight:700;font-size:11px;text-align:center;">\u5098\u8a3b</th></tr></thead><tbody>';
      var rotaMap={};for(var i=0;i<ROSTER_RAW.length;i++){var r=ROSTER_RAW[i];if(days.indexOf(r[1])!==-1){if(!rotaMap[r[0]])rotaMap[r[0]]={};rotaMap[r[0]][r[1]]=r[2];}}
      groupOrder.forEach(function(gk){var ids=Object.keys(STAFF).filter(function(id){return id.startsWith(gk);}).sort();if(ids.length===0)return;html+='<tr><td colspan="9" style="background:'+groupColor[gk]+'!important;color:#fff;font-weight:700;font-size:12px;text-align:left;padding:6px 8px;border:1.5px solid #000;letter-spacing:0.03em;">'+groupNames[gk]+'</td></tr>';ids.forEach(function(id){html+='<tr><td class="staff-cell" style="text-align:left;font-size:11px;white-space:nowrap;padding:4px 6px;border:1px solid #333;"><span class="print-staff-name">'+STAFF[id]+'</span><br><span style="font-size:10px;color:#666;font-weight:400;">'+id+'</span></td>';days.forEach(function(day){var shift=rotaMap[id]&&rotaMap[id][day];if(shift){var off=isOffShift(shift);var codeClass=off?'print-off':getShiftCodeClass(shift);html+='<td style="text-align:center;vertical-align:middle;border:1px solid #333;padding:4px;"><span class="print-cell '+codeClass+'">'+shift+'</span></td>';}else{html+='<td style="background:#F5F5F5;text-align:center;vertical-align:middle;border:1px solid #333;padding:4px;"><span class="print-empty-cell"></span></td>';}});html+='<td class="notes-cell" style="background:#F9F9F9;border:1px solid #333;padding:4px;"></td></tr>';});html+='<tr><td colspan="9" style="border:none;height:6px;background:transparent;"></td></tr>';});
      html+='<tr class="print-footer-row"><td colspan="9" style="background:#F0F4F8;border-top:2px solid #000;font-size:11px;text-align:left;padding:8px 10px;"><div class="print-footer-check"><label>\u6aa2\u6c42\u4eba \u7b71\u8f49:</label><input type="checkbox" style="width:14px;height:14px;"/><label>\u6aa2\u6c42\u4eba \u7b71\u8f49:</label><input type="checkbox" style="width:14px;height:14px;"/><label>\u4ee3\u7406\u8ab2\u9577:</label><input type="checkbox" style="width:14px;height:14px;"/></div></td></tr>';
      html+='</tbody></table></div>';
      html+='<div class="flex gap-2 mt-4 no-print"><button onclick="window.print()" class="px-4 py-2 rounded-xl bg-slate2 text-white text-sm font-semibold flex items-center gap-2 hover:bg-slate-700 transition-colors"><svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"/></svg>\u6253\u5370</button></div>';

    document.getElementById('printPrevBtn').addEventListener('click',function(){var p=new Date(document.getElementById('printWeekStart').value||'2026-03-02');p.setDate(p.getDate()-7);document.getElementById('printWeekStart').value=p.toISOString().split('T')[0];renderPrintView();});
